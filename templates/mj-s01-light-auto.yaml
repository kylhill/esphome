---
# Martin Jerry MJ-S01 - Light (Auto Off)
packages:
  parent: !include mj-s01-base.yaml
  light: !include components/mj-s01-light.yaml

script:
  - id: !extend on_single
    then:
      - if:
          condition:
            light.is_on: relay_light
          then:
            - light.turn_off: relay_light
          else:
            - light.turn_on: relay_light
            - script.execute: light_off_timer

  # Long press is an intentional manual override — it toggles without starting the
  # auto-off timer so the light stays on until explicitly turned off.
  - id: !extend on_long
    then:
      - light.toggle: relay_light
