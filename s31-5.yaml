---
substitutions:
  device_name: s31-5
  friendly_name: "Bedroom Light 2"
  area: "Master Bedroom"
  static_ip: 192.168.7.15

packages:
  common: !include templates/common.yaml
  device: !include templates/s31-bedtime-light.yaml

script:
  - id: !extend on_double
    then:
      - homeassistant.action:
          action: light.toggle
          data:
            entity_id: light.bedroom_light_1
      - homeassistant.action:
          action: light.toggle
          data:
            entity_id: light.bedroom_light_3
